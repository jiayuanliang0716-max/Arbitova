<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Arbitova</title>
  <meta name="description" content="Updates, changelogs, and insights from the Arbitova team.">
  <meta property="og:title" content="Blog — Arbitova">
  <meta property="og:description" content="Updates, changelogs, and insights from the Arbitova team.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200&h=675&fit=crop&q=80">
  <link rel="canonical" href="https://arbitova.com/blog">
  <meta property="og:url" content="https://arbitova.com/blog">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Arbitova">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Blog — Arbitova">
  <meta name="twitter:description" content="Updates, changelogs, and insights from the Arbitova team.">
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200&h=675&fit=crop&q=80">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/logo-192.png">
  <link rel="apple-touch-icon" href="/logo-192.png">
  <link rel="stylesheet" href="/css/tokens.css?v=202604140002">
  <link rel="stylesheet" href="/css/main.css?v=202604140002">
  <style>
    /* ── Reuters-style Blog Layout ── */
    * { box-sizing: border-box; }

    .blog-nav { position: sticky; top: 0; z-index: 100; background: var(--bg-base); border-bottom: 2px solid var(--brand); }
    .blog-nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .blog-nav-left { display: flex; align-items: center; gap: 24px; }
    .blog-brand { color: var(--text-primary); text-decoration: none; }
    .blog-nav-cats { display: flex; gap: 2px; }
    .blog-cat-btn { background: none; border: none; padding: 6px 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); cursor: pointer; border-radius: 4px; transition: all 0.15s; }
    .blog-cat-btn:hover, .blog-cat-btn.active { color: var(--brand); background: var(--brand-dim); }
    .blog-nav-right { display: flex; align-items: center; gap: 12px; }

    /* ── Page layout ── */
    .blog-page { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Date strip ── */
    .blog-date-strip { border-bottom: 1px solid var(--border-subtle); padding: 10px 0; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
    .blog-date-strip-left { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
    .blog-date-strip-right { font-size: 12px; color: var(--text-tertiary); }

    /* ── Featured post (Reuters hero) ── */
    .featured-post { display: grid; grid-template-columns: 1fr 420px; gap: 32px; padding-bottom: 32px; border-bottom: 2px solid var(--border-subtle); margin-bottom: 32px; }
    @media (max-width: 900px) { .featured-post { grid-template-columns: 1fr; } }
    .featured-img-wrap { position: relative; overflow: hidden; border-radius: 4px; aspect-ratio: 16/9; background: var(--bg-raised); }
    .featured-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .featured-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-raised) 0%, var(--bg-surface) 100%); }
    .pinned-badge { position: absolute; top: 12px; left: 12px; background: var(--brand); color: #000; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 2px; }
    .featured-body { display: flex; flex-direction: column; justify-content: center; gap: 14px; }
    .featured-cat { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); }
    .featured-title { font-size: 1.6rem; font-weight: 800; line-height: 1.25; color: var(--text-primary); cursor: pointer; }
    .featured-title:hover { color: var(--brand); }
    .featured-excerpt { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }
    .featured-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-tertiary); border-top: 1px solid var(--border-subtle); padding-top: 14px; }
    .featured-read { color: var(--brand); font-weight: 700; font-size: 13px; cursor: pointer; margin-top: auto; }
    .featured-read:hover { text-decoration: underline; }

    /* ── Secondary grid ── */
    .posts-section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; margin-bottom: 20px; }
    .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 900px) { .posts-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .posts-grid { grid-template-columns: 1fr; } }

    .post-card { display: flex; flex-direction: column; gap: 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px; }
    .post-card-img { aspect-ratio: 16/9; overflow: hidden; border-radius: 3px; margin-bottom: 14px; background: var(--bg-raised); position: relative; }
    .post-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
    .post-card:hover .post-card-img img { transform: scale(1.03); }
    .post-card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .post-card-cat { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 7px; }
    .post-card-title { font-size: 1rem; font-weight: 700; line-height: 1.35; color: var(--text-primary); cursor: pointer; margin-bottom: 8px; }
    .post-card-title:hover { color: var(--brand); }
    .post-card-excerpt { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; flex: 1; }
    .post-card-meta { font-size: 11px; color: var(--text-tertiary); margin-top: auto; }
    .post-card-pinned { position: absolute; top: 8px; left: 8px; background: var(--brand); color: #000; font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }

    /* ── Single post: Reuters two-column layout ── */
    .single-page { max-width: 1200px; margin: 0 auto; padding-top: 32px; }
    .single-layout { display: grid; grid-template-columns: 1fr 296px; gap: 52px; align-items: start; }
    @media (max-width: 900px) { .single-layout { grid-template-columns: 1fr; } .single-sidebar { display: none; } }

    /* ── Cover image: natural ratio, height cap, no distortion ── */
    .single-cover { overflow: hidden; border-radius: 4px; margin-bottom: 24px; background: var(--bg-raised); }
    .single-cover img { width: 100%; display: block; object-fit: cover; max-height: 460px; }

    /* ── Article text ── */
    .single-cat { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 10px; }
    .single-title { font-size: 2rem; font-weight: 800; line-height: 1.2; color: var(--text-primary); margin-bottom: 14px; letter-spacing: -0.02em; }
    .single-meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-tertiary); padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 28px; }
    .single-body { font-size: 1rem; line-height: 1.85; color: var(--text-secondary); }
    .single-body h2 { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin: 36px 0 12px; }
    .single-body h3 { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin: 24px 0 8px; }
    .single-body p { margin-bottom: 16px; }
    .single-body code { background: var(--bg-raised); border: 1px solid var(--border-subtle); padding: 2px 7px; border-radius: 4px; font-size: 0.875em; color: var(--brand); }
    .single-body pre { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 20px; overflow-x: auto; margin: 20px 0; }
    .single-body ul { padding-left: 26px; margin-bottom: 16px; }
    .single-body li { margin-bottom: 6px; }
    .single-body img { width: 100%; border-radius: 4px; margin: 20px 0; display: block; }
    .single-body blockquote { border-left: 3px solid var(--brand); padding-left: 20px; margin: 24px 0; color: var(--text-secondary); font-style: italic; }

    /* ── Sidebar ── */
    .single-sidebar { position: sticky; top: 68px; }
    .sidebar-section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); border-bottom: 2px solid var(--text-primary); padding-bottom: 8px; margin-bottom: 0; }
    .sidebar-post { display: grid; grid-template-columns: 72px 1fr; gap: 10px; padding: 14px 0; border-bottom: 1px solid var(--border-subtle); cursor: pointer; }
    .sidebar-post:last-child { border-bottom: none; }
    .sidebar-post:hover .sidebar-post-title { color: var(--brand); }
    .sidebar-thumb { width: 72px; height: 52px; border-radius: 2px; overflow: hidden; background: var(--bg-raised); flex-shrink: 0; }
    .sidebar-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sidebar-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .sidebar-post-cat { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--brand); margin-bottom: 3px; }
    .sidebar-post-title { font-size: 0.78rem; font-weight: 700; line-height: 1.35; color: var(--text-primary); transition: color 0.15s; }
    .sidebar-post-date { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; }

    /* ── Back button ── */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 20px; }
    .back-btn:hover { color: var(--brand); }

    /* ── Share trigger ── */
    .share-row { display: flex; align-items: center; gap: 10px; padding: 14px 0; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); margin-bottom: 28px; }
    .share-trigger { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border-default); cursor: pointer; background: var(--bg-raised); color: var(--text-primary); font-family: inherit; transition: background 0.15s; }
    .share-trigger:hover { background: var(--brand-dim, rgba(0,194,168,0.08)); border-color: var(--brand); color: var(--brand); }

    /* ── Share modal ── */
    .share-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .share-overlay.open { opacity: 1; pointer-events: all; }
    .share-modal { background: var(--bg-base); border: 1px solid var(--border-default); border-radius: 16px; padding: 28px; width: 100%; max-width: 400px; box-shadow: 0 24px 60px rgba(0,0,0,0.25); transform: translateY(12px); transition: transform 0.2s; }
    .share-overlay.open .share-modal { transform: translateY(0); }
    .share-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .share-modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .share-modal-close { background: none; border: none; cursor: pointer; color: var(--text-tertiary); padding: 4px; border-radius: 6px; line-height: 1; }
    .share-modal-close:hover { color: var(--text-primary); background: var(--bg-raised); }
    .share-modal-url { font-size: 11px; color: var(--text-tertiary); margin-bottom: 20px; word-break: break-all; }
    .share-platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .share-platform { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border-subtle); text-decoration: none; color: var(--text-primary); font-size: 13px; font-weight: 600; transition: background 0.15s, border-color 0.15s, color 0.15s; cursor: pointer; background: none; font-family: inherit; width: 100%; }
    .share-platform:hover { background: var(--bg-raised); border-color: var(--border-default); }
    .share-platform .sp-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sp-x .sp-icon { background: #000; }
    .sp-li .sp-icon { background: #0a66c2; }
    .sp-fb .sp-icon { background: #1877f2; }
    .sp-wa .sp-icon { background: #25d366; }
    .sp-tg .sp-icon { background: #229ed9; }
    .sp-rd .sp-icon { background: #ff4500; }
    .share-copy-row { display: flex; gap: 8px; }
    .share-copy-input { flex: 1; padding: 9px 12px; border: 1px solid var(--border-default); border-radius: 8px; background: var(--bg-raised); color: var(--text-secondary); font-size: 12px; font-family: monospace; outline: none; cursor: text; }
    .share-copy-btn { padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border-default); background: var(--bg-raised); color: var(--text-primary); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background 0.15s; }
    .share-copy-btn:hover { background: var(--brand); color: #000; border-color: var(--brand); }

    /* ── Admin ── */
    .admin-bar { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; display: none; align-items: center; justify-content: space-between; gap: 12px; }
    .admin-bar.show { display: flex; }
    .write-form { background: var(--bg-raised); border: 1px solid var(--border-default); border-radius: 12px; padding: 24px; margin-bottom: 28px; display: none; }
    .write-form.show { display: block; }
    .write-form input, .write-form select, .write-form textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border-default); border-radius: 6px; background: var(--bg-base); color: var(--text-primary); font-size: 14px; font-family: inherit; margin-bottom: 12px; box-sizing: border-box; }
    .write-form textarea { min-height: 220px; resize: vertical; }
    .write-form label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .form-row, .form-row-3 { grid-template-columns: 1fr; } }

    .empty-blog { text-align: center; padding: 80px 0; color: var(--text-tertiary); }
  </style>
</head>
<body>
<!-- Apply theme -->
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

<!-- Nav -->
<nav class="blog-nav">
  <div class="blog-nav-inner">
    <div class="blog-nav-left">
      <a href="/" class="blog-brand" style="display:flex;align-items:center;gap:8px;text-decoration:none">
        <svg width="30" height="20" viewBox="-2 -2 72 48" fill="none" aria-hidden="true">
          <defs><clipPath id="lc-blog"><circle cx="46" cy="22" r="20"/></clipPath></defs>
          <circle cx="22" cy="22" r="20" fill="#1D9E75" clip-path="url(#lc-blog)"/>
          <circle cx="22" cy="22" r="20" stroke="currentColor" stroke-width="2.5"/>
          <circle cx="46" cy="22" r="20" stroke="currentColor" stroke-width="2.5"/>
        </svg>
        <span style="font-size:0.85rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-primary)">ARBITOVA</span>
      </a>
      <div class="blog-nav-cats">
        <button class="blog-cat-btn active" onclick="filterCat(null, this)">All</button>
        <button class="blog-cat-btn" onclick="filterCat('announcement', this)">Announcements</button>
        <button class="blog-cat-btn" onclick="filterCat('update', this)">Updates</button>
        <button class="blog-cat-btn" onclick="filterCat('guide', this)">Guides</button>
        <button class="blog-cat-btn" onclick="filterCat('changelog', this)">Changelog</button>
      </div>
    </div>
    <div class="blog-nav-right">
      <a href="/" class="btn btn-ghost btn-sm" style="text-decoration:none;font-size:12px">← Back to Home</a>
    </div>
  </div>
</nav>

<div class="blog-page" id="blog-page">

  <!-- Admin bar -->
  <div class="admin-bar" id="admin-bar" style="margin-top:20px">
    <span style="font-size:13px;font-weight:700;color:var(--brand)">Admin Mode</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="toggleWriteForm()">+ Write Post</button>
    </div>
  </div>

  <!-- Write Form -->
  <div class="write-form" id="write-form">
    <h3 style="margin:0 0 18px;font-size:1rem;font-weight:700">New Post</h3>
    <label>Title</label>
    <input type="text" id="wf-title" placeholder="Post title...">
    <label>Cover Image URL (16:9 landscape recommended)</label>
    <input type="text" id="wf-cover" placeholder="https://images.unsplash.com/photo-...?w=1200&h=675&fit=crop">
    <div class="form-row-3">
      <div>
        <label>Category</label>
        <select id="wf-category">
          <option value="update">Update</option>
          <option value="changelog">Changelog</option>
          <option value="guide">Guide</option>
          <option value="announcement">Announcement</option>
        </select>
      </div>
      <div>
        <label>Author</label>
        <input type="text" id="wf-author" value="Arbitova Team">
      </div>
      <div>
        <label>Pin to top?</label>
        <select id="wf-pinned">
          <option value="false">No</option>
          <option value="true">Yes — Pin</option>
        </select>
      </div>
    </div>
    <label>Excerpt</label>
    <input type="text" id="wf-excerpt" placeholder="1-2 sentence summary...">
    <label>Content (Markdown)</label>
    <textarea id="wf-content" placeholder="## Heading&#10;&#10;Paragraph...&#10;&#10;![Image alt](https://...)"></textarea>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitPost()">Publish</button>
      <button class="btn btn-ghost" onclick="toggleWriteForm()">Cancel</button>
    </div>
  </div>

  <!-- Date strip -->
  <div class="blog-date-strip" id="blog-date-strip" style="margin-top:20px">
    <span class="blog-date-strip-left" id="strip-date"></span>
    <span class="blog-date-strip-right">Arbitova Blog</span>
  </div>

  <!-- Blog list -->
  <div id="blog-list">
    <div id="posts-container">
      <div class="empty-blog">Loading...</div>
    </div>
  </div>

  <!-- Share modal -->
  <div class="share-overlay" id="share-overlay" onclick="closeShareModal(event)">
    <div class="share-modal">
      <div class="share-modal-head">
        <span class="share-modal-title">Share this post</span>
        <button class="share-modal-close" onclick="closeShareModal()" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="share-modal-url" id="share-modal-url"></div>
      <div class="share-platform-grid" id="share-platform-grid"></div>
      <div class="share-copy-row">
        <input class="share-copy-input" id="share-copy-input" readonly>
        <button class="share-copy-btn" id="share-copy-btn" onclick="copyShareLink()">Copy link</button>
      </div>
    </div>
  </div>

  <!-- Single post view -->
  <div id="post-view" style="display:none">
    <div class="single-page">
      <button class="back-btn" onclick="showList()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        All Posts
      </button>
      <div class="single-layout">
        <main id="post-content"></main>
        <aside class="single-sidebar" id="sidebar-content"></aside>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://api.arbitova.com';
// Admin mode is URL-only (?admin=KEY). Never persisted to localStorage so normal visitors never see admin UI.
const adminKey = new URLSearchParams(location.search).get('admin') || null;
if (adminKey) {
  document.getElementById('admin-bar').classList.add('show');
}

// Set date strip
document.getElementById('strip-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

let allPosts = [];
let currentCat = null;

const CAT_COLORS = { changelog:'#3b82f6', update:'#00C896', guide:'#f59e0b', announcement:'#8b5cf6' };
function catColor(c) { return CAT_COLORS[c] || '#00C896'; }

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.blog-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const postView = document.getElementById('post-view');
  if (postView && postView.style.display === 'block') {
    postView.style.display = 'none';
    document.getElementById('blog-list').style.display = '';
    const strip = document.getElementById('blog-date-strip');
    if (strip) strip.style.display = '';
    if (location.search) history.pushState({}, '', location.pathname);
    window.scrollTo(0, 0);
  }
  renderPosts(cat ? allPosts.filter(p => p.category === cat) : allPosts);
}

async function loadPosts() {
  const container = document.getElementById('posts-container');
  try {
    const r = await fetch(API + '/api/v1/posts?limit=50').then(r => r.json());
    allPosts = r.posts || [];
    if (!allPosts.length) {
      container.innerHTML = '<div class="empty-blog"><p style="font-size:1.1rem;font-weight:600;color:var(--text-secondary)">No posts yet.</p><p style="color:var(--text-tertiary)">Check back soon for updates.</p></div>';
      return;
    }
    renderPosts(allPosts);
    const deepSlug = new URLSearchParams(location.search).get('post');
    if (deepSlug) openPost(deepSlug);
  } catch (e) {
    container.innerHTML = '<div class="empty-blog">Failed to load posts.</div>';
  }
}

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (!posts.length) {
    container.innerHTML = '<div class="empty-blog"><p style="color:var(--text-tertiary)">No posts in this category.</p></div>';
    return;
  }

  const featured = posts[0];
  const rest = posts.slice(1);

  const featuredHtml = `
    <div class="featured-post">
      <div class="featured-img-wrap" onclick="openPost('${escHtml(featured.slug)}')" style="cursor:pointer">
        ${featured.cover_image
          ? `<img src="${escHtml(featured.cover_image)}" alt="${escHtml(featured.title)}" loading="lazy">`
          : `<div class="featured-img-placeholder">${placeholderSvg(featured.category)}</div>`
        }
        ${featured.pinned ? '<span class="pinned-badge">Pinned</span>' : ''}
      </div>
      <div class="featured-body">
        <div class="featured-cat">${escHtml(featured.category)}</div>
        <div class="featured-title" onclick="openPost('${escHtml(featured.slug)}')">${escHtml(featured.title)}</div>
        <div class="featured-excerpt">${escHtml(featured.excerpt || '')}</div>
        <div class="featured-meta">
          <span>${formatDate(featured.created_at)}</span>
          <span>·</span>
          <span>${escHtml(featured.author_name)}</span>
          ${adminKey ? `<button class="btn btn-ghost btn-sm" style="margin-left:auto;font-size:11px;color:var(--danger)" onclick="deletePost('${featured.id}')">Delete</button>` : ''}
        </div>
        <span class="featured-read" onclick="openPost('${escHtml(featured.slug)}')">Read full story →</span>
      </div>
    </div>`;

  const gridHtml = rest.length ? `
    <p class="posts-section-title">More Stories</p>
    <div class="posts-grid">
      ${rest.map(p => `
        <div class="post-card">
          <div class="post-card-img" onclick="openPost('${escHtml(p.slug)}')" style="cursor:pointer">
            ${p.cover_image
              ? `<img src="${escHtml(p.cover_image)}" alt="${escHtml(p.title)}" loading="lazy">`
              : `<div class="post-card-img-placeholder" style="height:100%">${placeholderSvg(p.category)}</div>`
            }
            ${p.pinned ? '<span class="post-card-pinned">Pinned</span>' : ''}
          </div>
          <div class="post-card-cat">${escHtml(p.category)}</div>
          <div class="post-card-title" onclick="openPost('${escHtml(p.slug)}')">${escHtml(p.title)}</div>
          <div class="post-card-excerpt">${escHtml((p.excerpt || '').slice(0,100))}${(p.excerpt||'').length>100?'…':''}</div>
          <div class="post-card-meta">${formatDate(p.created_at)} · ${escHtml(p.author_name)}${adminKey ? ` <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:1px 6px;margin-left:8px;color:var(--danger)" onclick="deletePost('${p.id}')">×</button>` : ''}</div>
        </div>`).join('')}
    </div>` : '';

  container.innerHTML = featuredHtml + gridHtml;
}

function placeholderSvg(cat) {
  const color = catColor(cat);
  return `<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
}

async function openPost(slug) {
  document.getElementById('blog-list').style.display = 'none';
  document.getElementById('blog-date-strip').style.display = 'none';
  document.getElementById('post-view').style.display = 'block';
  if (location.search !== '?post=' + slug) history.pushState({slug}, '', '?post=' + slug);
  const container = document.getElementById('post-content');
  const sidebar = document.getElementById('sidebar-content');
  container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-tertiary)">Loading...</div>';
  sidebar.innerHTML = '';
  window.scrollTo(0, 0);
  try {
    const p = await fetch(API + '/api/v1/posts/' + slug).then(r => r.json());
    if (p.error) { container.innerHTML = '<p>Post not found.</p>'; return; }
    const coverHtml = p.cover_image
      ? `<div class="single-cover"><img src="${escHtml(p.cover_image)}" alt="${escHtml(p.title)}"></div>`
      : '';
    container.innerHTML = `
      ${coverHtml}
      <div class="single-cat">${escHtml(p.category)}${p.pinned ? ' · <span style="color:var(--brand)">Pinned</span>' : ''}</div>
      <h1 class="single-title">${escHtml(p.title)}</h1>
      <div class="single-meta">
        <span>${formatDate(p.created_at)}</span>
        <span>·</span>
        <span>By ${escHtml(p.author_name)}</span>
      </div>
      <div class="share-row">
        <button class="share-trigger" onclick="openShareModal('${escHtml(p.slug)}','${escHtml(p.title.replace(/'/g,"&#39;"))}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share this post
        </button>
      </div>
      <div class="single-body">${markdownToHtml(p.content)}</div>
    `;

    // Sidebar: related posts (same category first, then others, exclude current)
    const others = allPosts.filter(q => q.slug !== slug);
    const related = [
      ...others.filter(q => q.category === p.category),
      ...others.filter(q => q.category !== p.category)
    ].slice(0, 6);

    if (related.length) {
      sidebar.innerHTML = `
        <div class="sidebar-section-title">More Stories</div>
        ${related.map(r => `
          <div class="sidebar-post" onclick="openPost('${escHtml(r.slug)}')">
            <div class="sidebar-thumb">
              ${r.cover_image
                ? `<img src="${escHtml(r.cover_image)}" alt="${escHtml(r.title)}" loading="lazy">`
                : `<div class="sidebar-thumb-placeholder">${placeholderSvg(r.category)}</div>`}
            </div>
            <div>
              <div class="sidebar-post-cat">${escHtml(r.category)}</div>
              <div class="sidebar-post-title">${escHtml(r.title)}</div>
              <div class="sidebar-post-date">${formatDate(r.created_at)}</div>
            </div>
          </div>`).join('')}
      `;
    }
  } catch(e) {
    container.innerHTML = '<p>Failed to load post.</p>';
  }
}

function showList() {
  document.getElementById('blog-list').style.display = 'block';
  document.getElementById('blog-date-strip').style.display = 'flex';
  document.getElementById('post-view').style.display = 'none';
  window.scrollTo(0, 0);
  history.pushState(null, '', location.pathname);
}

function closeShareModal(e) {
  if (e && e.target !== document.getElementById('share-overlay')) return;
  document.getElementById('share-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function copyShareLink() {
  const val = document.getElementById('share-copy-input').value;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('share-copy-btn');
    btn.textContent = 'Copied!';
    btn.style.background = 'var(--brand)';
    setTimeout(() => { btn.textContent = 'Copy link'; btn.style.background = ''; }, 2000);
  });
}

window.addEventListener('popstate', () => {
  const slug = new URLSearchParams(location.search).get('post');
  if (slug) openPost(slug); else showList();
});

function toggleWriteForm() {
  document.getElementById('write-form').classList.toggle('show');
}

async function submitPost() {
  const title = document.getElementById('wf-title').value.trim();
  const content = document.getElementById('wf-content').value.trim();
  const excerpt = document.getElementById('wf-excerpt').value.trim();
  const cover_image = document.getElementById('wf-cover').value.trim() || null;
  const category = document.getElementById('wf-category').value;
  const author_name = document.getElementById('wf-author').value.trim() || 'Arbitova Team';
  const pinned = document.getElementById('wf-pinned').value === 'true';
  if (!title || !content) { alert('Title and content required.'); return; }
  try {
    const r = await fetch(API + '/api/v1/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
      body: JSON.stringify({ title, content, excerpt, cover_image, category, author_name, pinned })
    }).then(r => r.json());
    if (r.error) { alert('Error: ' + r.error); return; }
    document.getElementById('wf-title').value = '';
    document.getElementById('wf-content').value = '';
    document.getElementById('wf-excerpt').value = '';
    document.getElementById('wf-cover').value = '';
    toggleWriteForm();
    loadPosts();
  } catch(e) { alert('Failed: ' + e.message); }
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  await fetch(API + '/api/v1/posts/' + id, {
    method: 'DELETE', headers: { 'X-Admin-Key': adminKey }
  });
  loadPosts();
}

// Markdown renderer with image support
function markdownToHtml(md) {
  const images = [];
  md = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
    const idx = images.length;
    images.push(`<img src="${src.replace(/"/g,'')}" alt="${alt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}" style="width:100%;border-radius:6px;margin:20px 0;aspect-ratio:16/9;object-fit:cover;display:block">`);
    return `\x00IMG${idx}\x00`;
  });
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/(.+)/g, m => m.startsWith('<') ? m : '<p>' + m + '</p>');
  images.forEach((img, i) => { html = html.replace(`\x00IMG${i}\x00`, img); });
  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
