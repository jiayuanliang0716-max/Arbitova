<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — Arbitova</title>
  <meta name="description" content="Report a bug, request a feature, or ask a question. We read every message.">
  <meta property="og:title" content="Feedback — Arbitova">
  <meta property="og:description" content="Report a bug, request a feature, or ask a question.">
  <link rel="canonical" href="https://arbitova.com/feedback">
  <meta property="og:url" content="https://arbitova.com/feedback">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CclipPath id='fc'%3E%3Ccircle cx='21' cy='16' r='9'/%3E%3C/clipPath%3E%3C/defs%3E%3Ccircle cx='11' cy='16' r='9' fill='%231D9E75' clip-path='url(%23fc)'/%3E%3Ccircle cx='11' cy='16' r='9' fill='none' stroke='%231D9E75' stroke-width='1.8'/%3E%3Ccircle cx='21' cy='16' r='9' fill='none' stroke='%231D9E75' stroke-width='1.8'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg-surface: #111118;
      --bg-raised: #18181f;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --text-soft: #8888a8;
      --text-muted: #55556a;
      --brand: #00d4aa;
      --brand-dim: rgba(0,212,170,0.08);
      --brand-border: rgba(0,212,170,0.2);
      --danger: #ff5757;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--text-soft); text-decoration: none; font-size: 14px; transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--brand); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      border: none;
      font-family: inherit;
    }

    .btn-primary { background: var(--brand); color: #0a0a0f; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .page { max-width: 680px; margin: 0 auto; padding: 80px 40px 120px; }

    h1 {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-soft);
      font-size: 16px;
      margin-bottom: 48px;
    }

    .form-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px;
    }

    .row { margin-bottom: 22px; }
    .row:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-raised);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--brand);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      font-family: inherit;
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238888a8' d='M6 8L0 0h12z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .cat-btn {
      padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-raised);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      font-family: inherit;
    }
    .cat-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.16); }
    .cat-btn.active {
      background: var(--brand-dim);
      border-color: var(--brand-border);
      color: var(--brand);
    }

    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 8px;
    }

    .status-msg {
      font-size: 13px;
      color: var(--text-soft);
      flex: 1;
    }
    .status-msg.ok { color: var(--brand); }
    .status-msg.err { color: var(--danger); }

    footer {
      border-top: 1px solid var(--border);
      padding: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    footer a {
      color: var(--text-soft);
      text-decoration: none;
      margin-left: 24px;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text); }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 14px; font-size: 13px; }
      .page { padding: 56px 20px 80px; }
      h1 { font-size: 30px; }
      .form-card { padding: 24px; }
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      footer { flex-direction: column; gap: 12px; padding: 24px; }
      footer a { margin: 0 10px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <defs><clipPath id="fc2"><circle cx="21" cy="16" r="9"/></clipPath></defs>
      <circle cx="11" cy="16" r="9" fill="#1D9E75" clip-path="url(#fc2)"/>
      <circle cx="11" cy="16" r="9" fill="none" stroke="#1D9E75" stroke-width="1.8"/>
      <circle cx="21" cy="16" r="9" fill="none" stroke="#1D9E75" stroke-width="1.8"/>
    </svg>
    ARBITOVA
  </a>
  <div class="nav-links">
    <a href="/docs">Docs</a>
    <a href="/architecture">Architecture</a>
    <a href="/pricing">Pricing</a>
    <a href="/blog">Blog</a>
    <a href="/feedback" class="active">Feedback</a>
  </div>
</nav>

<div class="page">

  <h1>Send us feedback</h1>
  <p class="subtitle">Report a bug, request a feature, or ask a question. Every message is read by the team.</p>

  <form id="feedback-form" class="form-card" novalidate>

    <div class="row">
      <label>What's this about?</label>
      <div class="category-grid" role="radiogroup" aria-label="Feedback category">
        <button type="button" class="cat-btn active" data-category="bug" role="radio" aria-checked="true">Bug</button>
        <button type="button" class="cat-btn" data-category="feature" role="radio" aria-checked="false">Feature</button>
        <button type="button" class="cat-btn" data-category="question" role="radio" aria-checked="false">Question</button>
        <button type="button" class="cat-btn" data-category="other" role="radio" aria-checked="false">Other</button>
      </div>
      <input type="hidden" id="fb-category" name="category" value="bug">
    </div>

    <div class="row">
      <label for="fb-name">Your name</label>
      <input type="text" id="fb-name" name="name" maxlength="100" required autocomplete="name">
    </div>

    <div class="row">
      <label for="fb-email">Email</label>
      <input type="email" id="fb-email" name="email" maxlength="200" required autocomplete="email">
      <div class="hint">We'll reply here.</div>
    </div>

    <div class="row">
      <label for="fb-subject">Subject</label>
      <input type="text" id="fb-subject" name="subject" maxlength="150" placeholder="e.g. Dispute endpoint returns 500 on retry" required>
    </div>

    <div class="row">
      <label for="fb-message">Details</label>
      <textarea id="fb-message" name="message" maxlength="5000" placeholder="Steps to reproduce, expected vs actual behavior, relevant order/dispute IDs..." required></textarea>
      <div class="hint"><span id="fb-char-count">0</span> / 5000 characters</div>
    </div>

    <div class="submit-row">
      <div class="status-msg" id="fb-status" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary" id="fb-submit">Send feedback</button>
    </div>

  </form>

</div>

<footer>
  <span>&copy; 2026 Arbitova</span>
  <div>
    <a href="/docs">Docs</a>
    <a href="/architecture">Architecture</a>
    <a href="/pricing">Pricing</a>
    <a href="/blog">Blog</a>
  </div>
</footer>

<script>
  (function () {
    const catBtns = document.querySelectorAll('.cat-btn');
    const catInput = document.getElementById('fb-category');
    catBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        catBtns.forEach((b) => {
          b.classList.remove('active');
          b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-checked', 'true');
        catInput.value = btn.dataset.category;
      });
    });

    const msg = document.getElementById('fb-message');
    const count = document.getElementById('fb-char-count');
    msg.addEventListener('input', () => { count.textContent = msg.value.length; });

    const form = document.getElementById('feedback-form');
    const status = document.getElementById('fb-status');
    const submit = document.getElementById('fb-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.className = 'status-msg';
      status.textContent = '';

      const payload = {
        category: catInput.value,
        name: document.getElementById('fb-name').value.trim(),
        email: document.getElementById('fb-email').value.trim(),
        subject: document.getElementById('fb-subject').value.trim(),
        message: msg.value.trim(),
      };

      if (!payload.name || !payload.email || !payload.message) {
        status.className = 'status-msg err';
        status.textContent = 'Please fill out name, email, and details.';
        return;
      }

      submit.disabled = true;
      submit.textContent = 'Sending...';

      try {
        const res = await fetch('/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          status.className = 'status-msg err';
          status.textContent = data.error || 'Failed to send. Try again or email dev@arbitova.com.';
          submit.disabled = false;
          submit.textContent = 'Send feedback';
          return;
        }
        status.className = 'status-msg ok';
        status.textContent = 'Thanks — message sent. We\'ll reply soon.';
        form.reset();
        catInput.value = 'bug';
        catBtns.forEach((b, i) => {
          b.classList.toggle('active', i === 0);
          b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
        });
        count.textContent = '0';
        submit.disabled = false;
        submit.textContent = 'Send feedback';
      } catch (err) {
        status.className = 'status-msg err';
        status.textContent = 'Network error. Try emailing dev@arbitova.com directly.';
        submit.disabled = false;
        submit.textContent = 'Send feedback';
      }
    });
  })();
</script>

</body>
</html>
