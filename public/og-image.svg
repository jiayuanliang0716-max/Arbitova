<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0D0D14"/>

  <!-- Subtle background glow -->
  <circle cx="600" cy="315" r="280" fill="#00C2A8" opacity="0.04"/>

  <!-- Logo mark (centered, scaled up) -->
  <!-- viewBox 0 0 100 130, displayed at 200x260, offset to center -->
  <g transform="translate(368, 55) scale(2)">
    <line x1="6" y1="122" x2="41" y2="10" stroke="#FAFAF8" stroke-width="8" stroke-linecap="round"/>
    <line x1="94" y1="122" x2="59" y2="10" stroke="#FAFAF8" stroke-width="8" stroke-linecap="round"/>
    <line x1="41" y1="10" x2="59" y2="10" stroke="#00C2A8" stroke-width="8" stroke-linecap="round"/>
    <line x1="23" y1="68" x2="77" y2="68" stroke="#00C2A8" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="430"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300"
        font-size="72"
        letter-spacing="28"
        fill="#FAFAF8">ARBITOVA</text>

  <!-- Tagline -->
  <text x="600" y="488"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300"
        font-size="18"
        letter-spacing="6"
        fill="#00C2A8"
        opacity="0.8">AGENT ARBITRATION LAYER</text>
</svg>
