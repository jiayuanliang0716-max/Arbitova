services:
  - type: web
    name: a2a-system
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: a2a-db
          property: connectionString

databases:
  - name: a2a-db
    plan: free
